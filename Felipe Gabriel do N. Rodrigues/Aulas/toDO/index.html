<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="script.js"></script>

    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background: cadetblue;
            padding: 16px;
        }

        h1 {
            color: gold;
            text-align: center;
        }

        .input-area {
            text-align: center;
            margin-bottom: 20px;
        }

        #tarefaInput {
            padding: 8px;
            width: 250px;
            border-radius: 2px;
            border: none;
        }

        #btnAdicionar {
            padding: 8px 12px;
            margin-left: 5px;
            background-color: gold;
            color: black;
            border: none;
            border-radius: 2px;
            cursor: pointer;
        }

        #btnAdicionar:hover {
            transition: 0.5s;
            background-color: rgb(0, 0, 0);
            color: gold;
        }

        ul {
            padding: 0px;
        }

        li {
            background-color: gold;
            margin: 16px 16px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-content: center;
        }

        .fechar{
            background-color: white;
            border-radius: 100px;
            border: none;
        }

        li.concluida{
            text-decoration: line-through;
            color:gray;
        }
    </style>

</head>

<body>
    <h1>Tasks</h1>

    <div class="input-area">
        <input type="text" id="tarefaInput" placeholder="Digite sua tarefa!">
        <button id="btnAdicionar">+</button>
    </div>

    <ul id="listaTarefas">

    </ul>

</body>

</html>
